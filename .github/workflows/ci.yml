name: CI

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"

permissions:
  contents: write

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Zig test
        run: |
          zig version
          zig build test

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Package artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ASSET_NAME="codex-auth-${{ runner.os }}-${{ runner.arch }}.tar.gz"
          mkdir -p dist
          cp zig-out/bin/codex-auth dist/codex-auth
          tar -czf "${ASSET_NAME}" -C dist codex-auth
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $assetName = "codex-auth-${{ runner.os }}-${{ runner.arch }}.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item zig-out/bin/codex-auth.exe dist/codex-auth.exe
          Compress-Archive -Path dist/codex-auth.exe -DestinationPath $assetName -Force
          "ASSET_NAME=$assetName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        uses: actions/github-script@v7
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const cp = require("child_process");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = process.env.CURRENT_TAG;

            const allTags = cp
              .execSync("git tag --sort=-version:refname", { encoding: "utf8" })
              .split("\n")
              .map((s) => s.trim())
              .filter(Boolean);

            const previousTag = allTags.find((t) => t !== currentTag) ?? null;

            let compareCommits = [];
            if (previousTag) {
              const compare = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${previousTag}...${currentTag}`,
              });
              compareCommits = compare.data.commits ?? [];
            } else {
              const commits = await github.rest.repos.listCommits({
                owner,
                repo,
                sha: currentTag,
                per_page: 100,
              });
              compareCommits = (commits.data ?? []).reverse();
            }

            const commitLines = compareCommits.map((commit) => {
              const shortSha = commit.sha.slice(0, 7);
              const msg = (commit.commit?.message ?? "").split("\n")[0].trim() || shortSha;
              return `- ${msg} (${shortSha})`;
            });

            const lines = [];
            lines.push("## Changelog");
            lines.push("");

            if (previousTag) {
              lines.push(`Full Changelog: <a href="https://github.com/${owner}/${repo}/compare/${previousTag}...${currentTag}"><code>${previousTag}...${currentTag}</code></a>`);
            } else {
              lines.push(`Full Changelog: <a href="https://github.com/${owner}/${repo}/commits/${currentTag}"><code>${currentTag}</code></a>`);
            }
            lines.push("");

            if (commitLines.length > 0) {
              lines.push(...commitLines);
            } else {
              lines.push("- No code changes detected.");
            }

            fs.writeFileSync("release-notes.md", lines.join("\n") + "\n");

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release-notes.md
          files: release-assets/*
